<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=JetBrains+Mono:wght@400;700&display=swap');

        :root {
            --cyber-blue: #00f0ff;
            --cyber-blue-dark: #00414a;
            --cyber-red: #ff004e;
            --bg-dark: #05080a;
            --glow-blue: drop-shadow(0 0 5px rgba(0, 240, 255, 0.4));
        }

        body {
            background-color: var(--bg-dark);
            padding: 80px;
            font-family: 'JetBrains Mono', monospace;
        }

        .cyber-input-group {
            position: relative;
            width: 380px;
            height: 50px;
            margin-bottom: 20px;
        }

        /* Само поле ввода */
        .cyber-input {
            width: 100%;
            height: 100%;
            background: rgba(0, 240, 255, 0.05);
            border: none;
            outline: none;
            padding: 0 45px 0 20px;
            color: var(--cyber-blue);
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            letter-spacing: 1px;
            z-index: 2;
            position: relative;
            /* Срезаем углы у фона, чтобы они не вылазили */
            clip-path: polygon(0 0, 95% 0, 100% 30%, 100% 100%, 5% 100%, 0 70%);
        }

        .cyber-input::placeholder {
            color: var(--cyber-blue);
            opacity: 0.3;
        }

        /* SVG Каркас с красными акцентами */
        .input-svg-frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .line-blue {
            stroke: var(--cyber-blue);
            stroke-width: 1;
            fill: none;
            opacity: 0.6;
        }

        /* Те самые красные отломления */
        .line-red-accent {
            stroke: var(--cyber-red);
            stroke-width: 2;
            fill: none;
            filter: drop-shadow(0 0 3px var(--cyber-red));
        }

        /* Элементы при фокусе */
        .cyber-input:focus ~ .input-svg-frame .line-blue {
            stroke-width: 2;
            opacity: 1;
            filter: var(--glow-blue);
        }

        .cyber-input:focus ~ .input-svg-frame .line-red-accent {
            stroke-width: 3;
            animation: pulse-red 1s infinite alternate;
        }

        /* Декоративная иконка ID слева */
        .input-prefix {
            position: absolute;
            left: -35px;
            top: 50%;
            transform: translateY(-50%);
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            color: var(--cyber-blue);
            opacity: 0.5;
        }

        @keyframes pulse-red {
            from { opacity: 1; filter: drop-shadow(0 0 2px var(--cyber-red)); }
            to { opacity: 0.6; filter: drop-shadow(0 0 6px var(--cyber-red)); }
        }

    </style>
</head>
<body>

    <div class="cyber-input-group">
        <div class="input-prefix">LN_01</div>
        <input type="text" class="cyber-input" placeholder="ENTER_ENCRYPTION_KEY...">
        
        <svg class="input-svg-frame" viewBox="0 0 380 50" preserveAspectRatio="none">
            <path class="line-blue" d="M0 15 L15 0 H340" />
            <path class="line-blue" d="M380 15 V50 H40 L0 35 V25" />
            
            <path class="line-red-accent" d="M350 0 H380 L380 12" />
            <path class="line-red-accent" d="M30 50 H10 L0 40" />
            
            <rect x="360" y="45" width="10" height="2" fill="var(--cyber-blue)" />
        </svg>
    </div>

</body>
</html>
